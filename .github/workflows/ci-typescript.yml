name: TypeScript CI

on:
  push:
    branches: [ main ]
    paths:
      - 'typescript/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'typescript/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    - name: Install dependencies
      run: |
        cd typescript
        npm install
    - name: Run lint
      run: |
        cd typescript
        npm run lint
    - name: Run tests
      run: |
        cd typescript
        npm test
